{% extends "base.html" %}

{% block title %}Create Client — HR Recruitment AI{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-4xl font-bold">Create Client</h2>
    <p class="text-gray-600 mt-2">Clients represent the companies you are hiring for. Create one before adding a job.</p>
</div>

<div class="bg-white border border-gray-200 rounded-lg p-8 max-w-md">
    <form method="POST" action="/clients/create">
        <div class="mb-6">
            <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Client Name *</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="e.g., Acme Inc." required autofocus>
            <p class="text-xs text-gray-500 mt-1">The company name you are recruiting for</p>
        </div>

        <div class="flex gap-4">
            <button type="submit" class="btn-primary flex-1">Save Client</button>
            <a href="/jobs/create" class="btn-secondary flex-1 text-center">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
